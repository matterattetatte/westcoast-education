<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lägg till Kurs</title>
  <link rel="stylesheet" href="../assets/index.css" />
</head>
<body>
  <header class="hero">
    <div class="container">
      <div class="hero-nav">
        <a href="./index.html" class="back-link" aria-label="Tillbaka till kurser">
          ← Tillbaka
        </a>
        <h1 class="hero-title">Lägg till ny kurs</h1>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="admin-container container">
      
      <div class="admin-summary glass-card">
      <form id="new-course-form" class="admin-form glass-card">
        <h3>Kursinformation</h3>

        <div class="form-grid">
          <div class="form-group">
            <label for="title">Kurstitel *</label>
            <input type="text" id="title" name="title" required 
              placeholder="T.ex. Grundkurs i Excel" />
          </div>

          <div class="form-group">
            <label for="number">Kursnummer *</label>
            <input type="text" id="number" name="number" required 
              placeholder="T.ex. EXCEL-101" />
          </div>

          <div class="form-group">
            <label for="days">Antal dagar *</label>
            <input type="number" id="days" name="days" required min="1" max="365" 
              placeholder="1" />
          </div>

          <div class="form-group">
            <label for="cost">Kostnad (kr) *</label>
            <input type="number" id="cost" name="cost" required min="0" step="1" 
              placeholder="0" />
          </div>
        </div>

        <div class="form-actions">
          <button type="button" id="cancel-btn" class="btn btn--secondary">
            ← Avbryt
          </button>
          <button type="submit" class="btn btn--primary btn--block">
            Spara Ny Kurs
          </button>
        </div>
      </form>
    </div>
  </main>

  <script type="module" src="../assets/admin/new-course.js"></script>
</body>
</html>
