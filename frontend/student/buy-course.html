<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boka Kurs</title>
  <link rel="stylesheet" href="../assets/index.css" />
</head>
<body>
  <header class="hero">
    <div class="container">
      <div class="hero-nav">
        <a href="./courses.html" class="back-link" aria-label="Tillbaka till kurser">
          ← Tillbaka
        </a>
        <h1 id="course-title" class="hero-title">Boka kurs...</h1>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="booking-container container">
      
      <div class="course-summary glass-card">
        <h2 class="summary-title">Du bokar</h2>
        <h3 id="course-name" class="course-title">Laddar...</h3>
        <div class="course-meta">
          <span id="course-type">–</span>
          <span class="separator"> • </span>
          <span id="course-price" class="course-price">0 kr</span>
        </div>
      </div>

      <form id="booking-form" class="booking-form glass-card">
        <h3>Kunduppgifter</h3>

        <div class="form-grid">
          <div class="form-group">
            <label for="customer-name">Fullständigt namn *</label>
            <input type="text" id="customer-name" name="name" required autocomplete="name" />
          </div>

          <div class="form-group">
            <label for="customer-email">E-postadress *</label>
            <input type="email" id="customer-email" name="email" required autocomplete="email" />
          </div>

          <div class="form-group full-width">
            <label for="customer-address">Faktureringsadress *</label>
            <textarea id="customer-address" name="address" rows="3" required 
              placeholder="Gata, postnummer, ort" autocomplete="street-address"></textarea>
          </div>

          <div class="form-group">
            <label for="customer-phone">Mobilnummer</label>
            <input type="tel" id="customer-phone" name="phone" placeholder="07X XXX XX XX" 
              autocomplete="tel" pattern="[0-9\s\-+]+" />
          </div>

          <div class="form-group">
            <label for="course-format">Kursformat</label>
            <input type="text" id="course-format" readonly class="readonly-input" />
          </div>
        </div>

        <div class="form-actions">
          <button type="button" id="back-btn" class="btn btn--secondary">
            ← Avbryt
          </button>
          <button type="submit" class="btn btn--primary btn--block">
            Betala & Bekräfta Bokning
          </button>
        </div>
      </form>
    </div>
  </main>

  <script type="module">
    import { client } from '../assets/db.js'

    const urlParams = new URLSearchParams(window.location.search)
    const courseId = urlParams.get('id')
    const formatType = urlParams.get('type')

    if (!courseId) {
      document.body.innerHTML = '<div class="error-message">❌ Ingen kurs vald</div>'
    }

    if (!formatType) {
      document.body.innerHTML = '<div class="error-message">❌ Ingen typ vald</div>'
    }

    const [course] = await client.from('courses').select().eq('id', courseId)

    async function loadCourseAndUser() {
      try {
        // Ladda kurs
        const userId = localStorage.getItem('userId')
        const enrollments = await client.from('enrollments').select().eq('user_id', userId)
        const alreadyEnrolled = enrollments.find((e) => e.course_id === courseId)
        if (alreadyEnrolled) {
          alert('Redan inbokad!')
          return window.history.back()
        }

        // Uppdatera UI
        document.getElementById('course-title').textContent = `Boka: ${course.title}`
        document.getElementById('course-name').textContent = course.title
        document.getElementById('course-type').textContent = formatType === 'classroom' ? 'Klassrum' : 'Distans'
        document.getElementById('course-price').textContent = `${course.price || 0} kr`
        document.getElementById('course-format').value = formatType === 'classroom' ? 'Klassrum' : 'Distans'

        // Förifyll användardata om den finns
        if (userId) {
          const [profile] = await client.from('profiles').select().eq('id', userId)
          if (profile) {
            document.getElementById('customer-name').value    = profile.full_name  || ''
            document.getElementById('customer-email').value   = profile.email      || ''
            document.getElementById('customer-address').value = profile.billing_address || ''
            document.getElementById('customer-phone').value   = profile.phone      || ''
          }
        }

      } catch (err) {
        console.error(err)
        document.querySelector('.section').innerHTML = '<div class="error-message">Kunde inte ladda kursdata 😅</div>'
      }
    }

    async function handleBooking(e) {
      e.preventDefault()

      const formData = new FormData(e.target)
      const customer = {
        full_name:      formData.get('name')?.trim(),
        email:          formData.get('email')?.trim(),
        billing_address:formData.get('address')?.trim(),
        phone:          formData.get('phone')?.trim() || null,
      }

      if (!customer.full_name || !customer.email || !customer.billing_address) {
        alert('Vänligen fyll i alla obligatoriska fält')
        return
      }

      try {
        let userId = localStorage.getItem('userId')

        // Uppdatera eller skapa profil
        if (userId) {
          await client.from('profiles').update(customer).eq('id', userId)
        } else {
          const password = prompt('Please, provide password')

          let userId = null
          const [foundUser] = await client.from('profiles').select().eq('email', customer.email)

          if (!foundUser) {
            userId = crypto.randomUUID()

            await client.from('profiles').insert({
              id: userId,
              ...customer,
              password,
              role: 'student',
              created_at: new Date().toISOString()
            }).select()
          } else {
            if (foundUser.password !== password) {
              alert('Wrong password!')
              return
            }
            userId = foundUser.id
          }

          localStorage.setItem('userId', userId)
        }

        const now = new Date().toISOString()
        // Skapa köp & enrollment
        const purchaseId = crypto.randomUUID()
        await client.from('purchases').insert({
          id: purchaseId,
          course_id: courseId,
          user_id: userId,
          price_paid: course.price,
          purchased_at: now
        }).select()

        const enrollmentId = crypto.randomUUID()
        await client.from('enrollments').insert({
          id: enrollmentId,
          course_id: courseId,
          user_id: userId,
          type: formatType,
          payment_status: 'paid',           // TODO: egentligen efter betalning
          purchased_at: now
        }).select()

        alert(`Tack ${customer.full_name}! Din bokning är nu bekräftad.`)
        window.location.href = './courses.html?success=true'

      } catch (err) {
        console.error('Booking failed:', err)
        alert('Något gick fel vid bokningen. Försök igen eller kontakta support.')
      }
    }

    // Event listeners
    document.getElementById('booking-form').addEventListener('submit', handleBooking)
    document.getElementById('back-btn')?.addEventListener('click', () => history.back())

    // Start
    loadCourseAndUser()
  </script>
</body>
</html>
